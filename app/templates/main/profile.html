{% extends "base.html" %}

{% block title %} - User Profile{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; padding: 40px;">
    <h2 style="margin-bottom: 32px;">Profile Settings</h2>

    <form method="POST" enctype="multipart/form-data" action="{{ url_for('main.profile') }}">
        <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 32px;">
            {% if current_user.profile_pic_path %}
            <img src="{{ url_for('static', filename='uploads/' + current_user.profile_pic_path) }}" alt="Profile" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--color-border);">
            {% else %}
            <div style="width: 100px; height: 100px; border-radius: 50%; background-color: var(--color-bg); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 600; color: var(--color-accent); border: 2px solid var(--color-border);">
                {{ current_user.display_name[0]|upper }}
            </div>
            {% endif %}
            
            <div style="flex: 1;">
                <label class="form-label" style="display: block; margin-bottom: 8px;">Upload New Picture</label>
                <input type="file" name="profile_pic" accept="image/*" class="form-control" style="padding: 10px;">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-label">Display Name</label>
            <input type="text" name="display_name" value="{{ current_user.display_name }}" class="form-control" required>
        </div>

        <div class="form-group" style="margin-bottom: 32px;">
            <label class="form-label">Email Address (Read Only)</label>
            <input type="email" value="{{ current_user.email }}" class="form-control" disabled style="background-color: var(--color-bg); cursor: not-allowed;">
        </div>

        <div style="text-align: right;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
